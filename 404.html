<!DOCTYPE html>
<html lang="en">
<head><link rel="icon" type="image/webp" href="/images/logo-main.webp">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found | MAIGEER MACHINERY</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"DM Sans",sans-serif;background:#061a2f;color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px}
h1{font-family:"Bebas Neue",sans-serif;font-size:120px;color:#f5b400;line-height:1;margin-bottom:8px}
h2{font-family:"Bebas Neue",sans-serif;font-size:32px;letter-spacing:.05em;margin-bottom:16px}
p{color:rgba(255,255,255,.6);font-size:15px;margin-bottom:32px;max-width:400px}
a{display:inline-block;background:#f5b400;color:#061a2f;font-weight:700;font-size:13px;letter-spacing:.1em;text-transform:uppercase;padding:13px 32px;text-decoration:none;transition:background .2s}
a:hover{background:#ffd24d}
</style>
</head>
<body>
  <h1>404</h1>
  <h2 id="t-h2">Page Not Found</h2>
  <p id="t-p">The page you're looking for doesn't exist. Let's get you back on track.</p>
  <a id="t-a" href="/">← Back to Home</a>
<script>
(function(){
  var path = window.location.pathname;
  var lang = null;
  if (path.indexOf('/es/') === 0) lang = 'es';
  else if (path.indexOf('/ar/') === 0) lang = 'ar';
  else if (path.indexOf('/ru/') === 0) lang = 'ru';
  if (!lang) return;
  var copy = {
    es: {
      title: 'Página No Encontrada | MAIGEER MACHINERY',
      h2: 'Página No Encontrada',
      p: 'La página que busca no existe. Vamos a llevarlo de vuelta al camino correcto.',
      aText: '← Volver al Inicio',
      aHref: '/es/'
    },
    ar: {
      title: 'الصفحة غير موجودة | MAIGEER MACHINERY',
      h2: 'الصفحة غير موجودة',
      p: 'الصفحة التي تبحث عنها غير موجودة. دعنا نعيدك إلى المسار الصحيح.',
      aText: '→ العودة إلى الرئيسية',
      aHref: '/ar/'
    },
    ru: {
      title: 'Страница Не Найдена | MAIGEER MACHINERY',
      h2: 'Страница Не Найдена',
      p: 'Страница, которую вы ищете, не существует. Давайте вернём вас на верный путь.',
      aText: '← На Главную',
      aHref: '/ru/'
    }
  };
  var c = copy[lang];
  document.documentElement.lang = lang;
  if (lang === 'ar') document.documentElement.dir = 'rtl';
  document.title = c.title;
  document.getElementById('t-h2').textContent = c.h2;
  document.getElementById('t-p').textContent = c.p;
  var a = document.getElementById('t-a');
  a.textContent = c.aText;
  a.href = c.aHref;
})();
</script>
</body>
</html>
